<div class="product-list-container">
  <h2>Products</h2>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading products...
  </div>

  <div *ngIf="!isLoading" class="products-grid">
    <div *ngFor="let product of products" class="product-card">
      <img [src]="product.imageUrl" [alt]="product.name">
      <h3>{{ product.name }}</h3>
      <p>{{ product.description }}</p>
      <p class="price">{{ product.getFormattedPrice() }}</p>
      <p [class.in-stock]="product.isInStock()">
        Stock: {{ product.stock }}
      </p>
      <button [disabled]="!product.isInStock()" class="btn btn-sm btn-primary">
        Add to Cart
      </button>
    </div>
  </div>
</div>
