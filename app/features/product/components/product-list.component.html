<div class="page-container">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-semibold tracking-tight">Products</h1>
    <div class="flex items-center space-x-4">
      <span class="text-sm text-muted-foreground">Cart: {{ cartItemCount }}</span>
      <button class="btn btn-primary" (click)="navigateNew()">New Product</button>
    </div>
  </div>

  <div *ngIf="isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="card p-4 animate-pulse">
      <div class="aspect-[4/3] bg-slate-200 rounded-lg mb-3"></div>
      <div class="h-4 bg-slate-200 rounded mb-2"></div>
      <div class="h-3 bg-slate-200 rounded mb-2"></div>
      <div class="h-4 bg-slate-200 rounded w-1/2"></div>
    </div>
  </div>

  <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div *ngFor="let product of products" class="card p-4 group">
      <div class="aspect-[4/3] bg-slate-100 rounded-lg mb-3 relative overflow-hidden">
        <img [src]="product.imageUrl" [alt]="product.name" class="w-full h-full object-cover transition-transform group-hover:scale-105">
        <div class="absolute top-2 right-2 bg-white px-2 py-1 rounded text-sm font-semibold shadow-sm">
          {{ product.getFormattedPrice() }}
        </div>
        <div *ngIf="!product.isInStock()" class="absolute inset-0 bg-black/50 flex items-center justify-center">
          <span class="text-white font-semibold">Out of Stock</span>
        </div>
      </div>
      <h3 class="font-semibold text-lg">{{ product.name }}</h3>
      <p class="text-sm text-muted-foreground mb-2">{{ product.description }}</p>
      <p class="text-xs text-muted-foreground">Stock: {{ product.stock }}</p>
      <div class="flex justify-end space-x-2 mt-3 opacity-0 group-hover:opacity-100 transition-opacity">
        <button [disabled]="!product.isInStock()" class="btn btn-primary btn-sm" (click)="addToCart(product)">
          <mat-icon class="text-sm">add_shopping_cart</mat-icon>
        </button>
        <button class="btn btn-secondary btn-sm" (click)="navigateEdit(product.id)">
          <mat-icon class="text-sm">edit</mat-icon>
        </button>
        <button class="btn btn-danger btn-sm" (click)="removeProduct(product.id)">
          <mat-icon class="text-sm">delete</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
