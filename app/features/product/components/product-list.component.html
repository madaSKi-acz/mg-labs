<div class="min-h-screen bg-gray-50">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Products</h1>
        <p class="text-gray-600 mt-2">Manage your product catalog</p>
      </div>
      <button 
        (click)="navigateNew()"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-lg transition-colors duration-200 flex items-center gap-2"
      >
        <mat-icon>add</mat-icon>
        New Product
      </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="bg-white rounded-2xl shadow-sm overflow-hidden animate-pulse">
        <div class="w-full aspect-square bg-gray-200"></div>
        <div class="p-4">
          <div class="h-4 bg-gray-200 rounded mb-2"></div>
          <div class="h-3 bg-gray-100 rounded mb-3 w-2/3"></div>
          <div class="h-6 bg-gray-300 rounded w-1/3 mb-4"></div>
          <div class="h-10 bg-gray-200 rounded"></div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && products.length === 0" class="text-center py-20">
      <mat-icon class="text-6xl text-gray-300 mx-auto mb-4">shopping_bag</mat-icon>
      <h3 class="text-xl font-semibold text-gray-900 mb-2">No products found</h3>
      <p class="text-gray-600 mb-6">Start by creating your first product</p>
      <button 
        (click)="navigateNew()"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors"
      >
        Create Product
      </button>
    </div>

    <!-- Products Grid -->
    <div *ngIf="!isLoading && products.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <app-product-card
        *ngFor="let product of products"
        [product]="product"
        (addToCart)="addToCart($event)"
        (edit)="navigateEdit($event)"
        (delete)="removeProduct($event)"
      />
    </div>
  </div>
</div>
