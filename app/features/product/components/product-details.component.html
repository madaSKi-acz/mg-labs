<div class="product-details" *ngIf="product">
  <div class="product-image">
    <img [src]="product.imageUrl" [alt]="product.name">
  </div>
  <div class="product-info">
    <h1>{{ product.name }}</h1>
    <p class="description">{{ product.description }}</p>
    <p class="price">{{ product.getFormattedPrice() }}</p>
    <p [class.in-stock]="product.isInStock()" [class.low-stock]="product.isLowStock()">
      Stock: {{ product.stock }}
    </p>
    <button [disabled]="!product.isInStock()" class="btn btn-primary">Add to Cart</button>
  </div>
</div>
