<div class="dashboard-container">
  <div class="welcome-section">
    <h1>Welcome to MG Labs</h1>
    <p *ngIf="!isAuthenticated" class="auth-message">Please log in or explore the application</p>
    <p *ngIf="isAuthenticated" class="auth-message">You are logged in. Explore the features.</p>
  </div>

  <div class="features-grid">
    <div class="feature-card card">
      <div class="card-header">
        <mat-icon class="card-icon">shopping_cart</mat-icon>
        <h3>Products</h3>
      </div>
      <p>Browse and manage products</p>
      <button (click)="navigateTo('/products')" class="btn btn-primary">View Products</button>
    </div>

    <div class="feature-card card">
      <div class="card-header">
        <mat-icon class="card-icon">person</mat-icon>
        <h3>Profile</h3>
      </div>
      <p>Manage your profile and settings</p>
      <button (click)="navigateTo('/user/profile')" class="btn btn-primary">Go to Profile</button>
    </div>

    <div class="feature-card card">
      <div class="card-header">
        <mat-icon class="card-icon">admin_panel_settings</mat-icon>
        <h3>Admin</h3>
      </div>
      <p>Administrative dashboard and controls</p>
      <button (click)="navigateTo('/admin')" class="btn btn-primary" *ngIf="isAuthenticated">Admin Panel</button>
      <p *ngIf="!isAuthenticated" class="text-muted">Login required</p>
    </div>
  </div>

  <div *ngIf="isAuthenticated" class="action-buttons">
    <button (click)="logout()" class="btn btn-danger">Logout</button>
  </div>
</div>
