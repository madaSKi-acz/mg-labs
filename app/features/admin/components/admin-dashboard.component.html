<div class="admin-dashboard">
  <h1>Admin Dashboard</h1>
  
  <div *ngIf="isLoading" class="alert alert-info">
    Loading dashboard...
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="dashboardStats" class="stats-grid">
    <div class="stat-card">
      <h3>Total Users</h3>
      <p class="stat-value">{{ dashboardStats.totalUsers }}</p>
    </div>
    <div class="stat-card">
      <h3>Total Products</h3>
      <p class="stat-value">{{ dashboardStats.totalProducts }}</p>
    </div>
    <div class="stat-card">
      <h3>Total Orders</h3>
      <p class="stat-value">{{ dashboardStats.totalOrders }}</p>
    </div>
    <div class="stat-card">
      <h3>Total Revenue</h3>
      <p class="stat-value">{{ dashboardStats.getFormattedRevenue() }}</p>
    </div>
  </div>

  <button (click)="refreshData()" class="btn btn-primary">Refresh</button>
</div>
