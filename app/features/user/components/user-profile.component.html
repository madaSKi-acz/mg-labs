<div class="user-profile">
  <h2>User Profile</h2>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading profile...
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="user && !isEditing" class="profile-view">
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Name:</strong> {{ user.getFullName() }}</p>
    <p><strong>Role:</strong> {{ user.role }}</p>
    <button (click)="toggleEditMode()" class="btn btn-primary">Edit Profile</button>
  </div>

  <div *ngIf="user && isEditing" class="profile-edit">
    <form>
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input id="firstName" type="text" [(ngModel)]="user.firstName" name="firstName" class="form-control">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input id="lastName" type="text" [(ngModel)]="user.lastName" name="lastName" class="form-control">
      </div>
      <button type="button" (click)="saveChanges()" class="btn btn-success">Save</button>
      <button type="button" (click)="toggleEditMode()" class="btn btn-secondary">Cancel</button>
    </form>
  </div>

  <div class="preferences-section">
    <h3>Preferences</h3>
    <div class="form-group">
      <label for="theme">Theme</label>
      <select id="theme" [(ngModel)]="preferences.theme" (change)="savePreferences()" class="form-control">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>
    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="preferences.notifications" (change)="savePreferences()">
        Enable Notifications
      </label>
    </div>
    <div class="form-group">
      <label for="language">Language</label>
      <select id="language" [(ngModel)]="preferences.language" (change)="savePreferences()" class="form-control">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
      </select>
    </div>
  </div>
</div>
