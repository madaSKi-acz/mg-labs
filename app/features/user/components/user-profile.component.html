<div class="user-profile">
  <h2>User Profile</h2>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading profile...
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="user && !isEditing" class="profile-view">
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Name:</strong> {{ user.getFullName() }}</p>
    <p><strong>Role:</strong> {{ user.role }}</p>
    <button (click)="toggleEditMode()" class="btn btn-primary">Edit Profile</button>
  </div>

  <div *ngIf="user && isEditing" class="profile-edit">
    <form>
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input id="firstName" type="text" [(ngModel)]="user.firstName" name="firstName" class="form-control">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input id="lastName" type="text" [(ngModel)]="user.lastName" name="lastName" class="form-control">
      </div>
      <button type="button" (click)="saveChanges()" class="btn btn-success">Save</button>
      <button type="button" (click)="toggleEditMode()" class="btn btn-secondary">Cancel</button>
    </form>
  </div>
</div>
