<aside class="sidebar">
  <div class="sidebar-header">
    <h3>Navigation</h3>
  </div>
  <nav class="sidebar-nav">
    <a *ngFor="let item of menuItems" [href]="item.link" class="sidebar-link">
      <span class="icon">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </a>
  </nav>
</aside>
