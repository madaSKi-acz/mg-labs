<div class="h-screen grid grid-rows-[auto_1fr] overflow-hidden bg-slate-50">
  @if (isAuthenticated() && showLayout()) {
    <!-- fixed header -->
    <header class="sticky top-0 z-50 h-16 border-b border-slate-200/60 bg-white/80 backdrop-blur-md">
      <div class="max-w-7xl mx-auto h-full px-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button
            (click)="toggleSidebar()"
            class="p-2 rounded-lg bg-slate-100 hover:bg-slate-200 transition-all duration-300 active:scale-95"
            aria-label="Toggle sidebar"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
          <p class="text-lg font-semibold tracking-tight text-slate-900">MG Labs</p>
        </div>

        <div class="flex items-center gap-4">
          @if (currentUser()) {
            <div class="text-right">
              <p class="text-sm font-semibold text-slate-800">{{ currentUser()!.getFullName() }}</p>
              <p class="text-xs text-slate-500">Product Manager</p>
            </div>
          }
          <button
            (click)="logout()"
            class="rounded-lg bg-red-600 hover:bg-red-700 text-white px-4 py-2 text-sm font-medium transition-all duration-300 active:scale-95"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-[auto_1fr] overflow-hidden">
      <app-sidebar
        [collapsed]="isSidebarCollapsed()"
        class="transition-all duration-300"
      ></app-sidebar>

      <main class="min-h-[calc(100vh-4rem)] overflow-y-auto bg-slate-50 p-6">
        <router-outlet></router-outlet>
      </main>
    </div>
  } @else {
    <div class="h-screen overflow-auto bg-slate-50">
      <router-outlet></router-outlet>
    </div>
  }
</div>
